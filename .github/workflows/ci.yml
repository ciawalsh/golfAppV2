name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: npm ci

      - name: Install Functions dependencies
        run: npm --prefix functions ci

      - name: Build Cloud Functions
        run: npm --prefix functions run build

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format

      - name: Firebase Rules Tests
        run: npm run test:rules

      - name: Secret scan
        run: |
          FOUND=$(grep -rn "AIza\|sk_live\|sk_test\|Bearer \|apiKey.*=.*['\"]" src/ functions/src/ app/ app.config.ts --include="*.ts" --include="*.tsx" --include="*.js" || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Potential secrets found in source code:"
            echo "$FOUND"
            exit 1
          fi
          echo "No secrets found."
